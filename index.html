<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Gungun! 💖</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,800;1,500&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- BACKGROUND STARS EFFECT & CANVAS SYSTEM -->
    <div class="stars"></div>
    <canvas id="effectCanvas"></canvas>
    <div id="rainContainer"></div>

    <!-- AUDIO FILES SYSTEM -->
    <!-- Ticking sound counting ke liye -->
    <audio id="countdownAudio" src="countdown.mp3" preload="auto"></audio>
    <!-- Background music happy birthday screen se start hone ke liye -->
    <audio id="bgMusic" src="music.mp3" preload="auto" loop></audio>

    <!-- MAIN INTERACTIVE CONTAINER -->
    <div class="container">

        <!-- STEP 1 & 2: GIFT BOX & SHAKING SECTION -->
        <div id="giftSection">
            <img id="giftBox" class="gift-img" src="gift.png" alt="Special Gift for You">
            <p class="tap-text">Tap on the Gift Box to Open! ✨</p>
        </div>

        <!-- STEP 3: COUNTDOWN TIMER SCREEN (SHOWN AFTER SHAKE) -->
        <div id="countdownScreen" class="hidden">
            <div id="countdownNumber">3</div>
        </div>

        <!-- STEP 4: ZOOM IN HAPPY BIRTHDAY BIG GREETING SCREEN -->
        <div id="bdayGreetingScreen" class="hidden">
            <h1 class="bday-text">HAPPY BIRTHDAY GUNGUN 💖</h1>
        </div>

        <!-- STEP 4.5: TEMPLATE TRANSITION IMAGE (Middle view for 15s) -->
        <div id="templateSection" class="hidden template-wrapper">
            <img class="template-img" src="template.png" alt="Birthday Special Memory">
        </div>

        <!-- STEP 5: PURE CSS NOTEBOOK LETTER BOX (100% STRAIGHT DOTTED LINES) -->
        <div id="messageSection" class="hidden scroll-letter">
            <!-- JavaScript automatic typewriter text engine target -->
            <div id="typewriterText" class="letter-text"></div>
        </div>

    </div>

    <!-- Main Logic Script Engine -->
    <script src="script.js"></script>
</body>
</html>
