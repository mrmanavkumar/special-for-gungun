<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Gungun ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- 🌌 Stars -->

<div class="stars"></div>

<!-- ❤️ Hearts -->

<div id="hearts"></div>

<!-- 🌹 Rose Petals -->

<div id="roseContainer"></div>

<!-- 🎁 Gift Screen -->

<div id="giftScreen">

<div class="gift-box" onclick="openGift()">

<img src="gift.png" alt="Gift">

</div>

<h2 class="tap-text">

🎁 Tap The Gift 🎁

</h2>

</div>

<!-- ⏳ Countdown -->

<div id="countdownScreen">

<h1 id="countdownText">

3

</h1>

</div>

<!-- 🎉 Birthday Screen -->

<div id="surprise">

<div class="birthday-wrapper">

<h1 class="birthday-title">

🎉 Happy Birthday 🎉

</h1>

<img
src="birthday-template.png"
class="birthday-template"
alt="Birthday">

</div>

</div>
  <!-- 💌 Final Letter -->

<div id="finalMessage">

    <div class="letter">

        <img src="sketch.png" class="sketch" alt="Sketch">

        <h2>❤️ Happy Birthday Gungun ❤️</h2>

        <div id="messageBox">

            <p id="messageText"></p>

        </div>

    </div>

</div>

<!-- Audio -->

<audio id="countdown" preload="auto">

    <source src="countdown.mp3" type="audio/mpeg">

</audio>

<script src="script.js"></script>

</body>

</html>
