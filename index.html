<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- ⭐ Background Stars -->

<div id="stars"></div>

<!-- ❤️ Floating Hearts -->

<div id="hearts"></div>

<!-- 🌹 Rose Petals -->

<div id="roseContainer"></div>

<!-- 🎁 Gift Screen -->

<div id="giftScreen">

<div id="giftBox">

<img src="gift.png" alt="Gift">

</div>

<h2>

🎁 Tap The Gift 🎁

</h2>

</div>

<!-- ⏳ Countdown -->

<div id="countdownScreen">

<h1 id="countText">

3

</h1>

</div>

<!-- 🎉 Happy Birthday Screen -->

<div id="birthdayScreen">

<div class="birthdayCard">

<h1>

🎉 Happy Birthday 🎉

</h1>

<img
src="birthday-template.png"
id="birthdayTemplate">

</div>

</div>
<!-- 💌 Final Letter Screen -->

<div id="letterScreen">

    <div class="letterCard">

        <!-- Sketch Watermark -->

        <img
            src="sketch.png"
            id="sketch"
            alt="Sketch">

        <h1>
            ❤️ Happy Birthday Gungun ❤️
        </h1>

        <div id="messageContainer">

            <p id="messageText"></p>

        </div>

    </div>

</div>

<!-- ⏱️ Countdown Sound -->

<audio id="countdownAudio" preload="auto">

    <source src="countdown.mp3" type="audio/mpeg">

</audio>

<!-- JavaScript -->

<script src="script.js"></script>

</body>

</html>
